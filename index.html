<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>Rat Tracker</title>
<style>
  :root {
    --bg: #000000;
    --bg-subtle: #060606;
    --surface: #0d0d0d;
    --surface-2: #141414;
    --surface-3: #1a1a1a;
    --border: #1c1c1c;
    --border-light: #2a2a2a;
    --text: #eee;
    --text-muted: #888;
    --text-dim: #555;
    --accent: #ffffff;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 18px;
    --shadow: 0 4px 24px rgba(0,0,0,0.45);
    --transition: 0.15s ease;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  button { font-family: inherit; cursor: pointer; transition: transform 0.1s ease, opacity 0.1s ease, background var(--transition), border-color var(--transition), color var(--transition); }
  button:active { transform: scale(0.97); opacity: 0.9; }
  input { font-family: inherit; transition: border-color var(--transition), background var(--transition); }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

  * { scrollbar-width: thin; scrollbar-color: #333 #050505; }
  *::-webkit-scrollbar { width: 6px; height: 6px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: #333; border-radius: 6px; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    background-image: radial-gradient(ellipse 120% 60% at 50% -10%, rgba(255,255,255,0.04), transparent);
    color: var(--text);
    padding-bottom: 90px;
    -webkit-font-smoothing: antialiased;
    font-size: 16px;
    line-height: 1.45;
    overflow-x: hidden;
  }

  .page { display: none; padding: 14px 14px 20px; width: 100%; }
  .page.active { display: block; animation: fadeIn 0.2s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes sheetUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .modal-sheet { animation: sheetUp 0.22s cubic-bezier(0.2,0.9,0.3,1); }

  @keyframes shinyFlash {
    0% { background-color: #ffffff; box-shadow: 0 0 30px #ffffff; }
    30% { background-color: #ffffff; }
    100% { background-color: var(--surface); }
  }
  .card-completed-flash { animation: shinyFlash 0.55s ease-out forwards; }

  /* Shared components */
  .section-label {
    color: var(--text-muted);
    font-size: 11px;
    margin: 16px 2px 8px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 700;
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .panel-title {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 10px;
  }
  .card-meta {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .status-badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    color: #aaa;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border-light);
    border-radius: 999px;
    padding: 4px 10px;
    margin-bottom: 10px;
  }
  .status-badge.done { color: #fff; border-color: rgba(255,255,255,0.25); }
  .card-hint {
    font-size: 13px;
    color: #777;
    margin-top: 4px;
  }
  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 15px;
  }
  .btn-secondary {
    width: 100%;
    padding: 13px;
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 15px;
  }
  .btn-ghost {
    padding: 13px;
    background: transparent;
    color: #bbb;
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    font-weight: 600;
    font-size: 14px;
  }
  .btn-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface-3);
    color: var(--text);
    border: 1px solid var(--border-light);
    font-size: 18px;
    flex-shrink: 0;
  }
  .input-field {
    flex: 1;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 12px;
    text-align: center;
    font-size: 16px;
    font-weight: 600;
  }
  .input-field:focus { outline: none; border-color: var(--accent); background: var(--surface-3); }
  .empty-state {
    text-align: center;
    color: var(--text-dim);
    padding: 36px 12px;
    font-size: 14px;
    line-height: 1.5;
  }
  .stat-hero {
    background: linear-gradient(150deg, var(--surface), var(--bg-subtle));
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 18px;
    margin-bottom: 14px;
    text-align: center;
  }
  .stat-hero-num { font-size: 32px; font-weight: 800; color: #fff; line-height: 1; }
  .stat-hero-label { font-size: 13px; color: var(--text-muted); margin-top: 6px; }
  .progress-up { color: #8f8; }
  .progress-down { color: #f88; }
  .progress-flat { color: #aaa; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 100;
    align-items: flex-end;
  }
  .modal-handle {
    width: 40px;
    height: 5px;
    background: #333;
    border-radius: 999px;
    margin: 10px auto 0;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
  }
  .modal-date { color: var(--text-muted); font-size: 12px; font-weight: 600; }
  .modal-title { font-size: 20px; font-weight: 800; margin-top: 2px; }

  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    position: relative;
  }
  .exercise-name { font-size: 17px; font-weight: 700; margin-bottom: 6px; line-height: 1.25; }
  .exercise-target {
    font-size: 12px;
    color: #fff;
    background: rgba(255,255,255,0.1);
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .exercise-note {
    font-size: 12px;
    line-height: 1.45;
    color: #999;
    background: var(--surface-2);
    border-left: 3px solid #fff;
    padding: 8px 10px;
    margin: 4px 0 12px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  }
  .exercise-body { display: flex; gap: 12px; align-items: center; margin-top: 6px; }
  .exercise-icon-wrap {
    width: 72px;
    flex-shrink: 0;
    text-align: center;
  }
  .exercise-icon-box {
    width: 100%;
    aspect-ratio: 1;
    border-radius: var(--radius-md);
    background: #000;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8%;
  }
  .exercise-cat-label { font-size: 10px; color: var(--text-muted); margin-top: 5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
  .timer-box {
    margin-top: 12px;
    background: #000;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px;
  }
  .timer-display {
    font-size: 34px;
    font-weight: 800;
    text-align: center;
    font-variant-numeric: tabular-nums;
    color: #fff;
    line-height: 1;
  }
  .timer-sub { font-size: 13px; color: var(--text-muted); text-align: center; margin: 6px 0 10px; }
  .timer-btn {
    width: 100%;
    padding: 13px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 14px;
  }
  .done-btn {
    width: 100%;
    margin-top: 10px;
    padding: 13px;
    background: var(--surface-2);
    color: #fff;
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 14px;
  }
  .completed-box {
    display: none;
    text-align: center;
    padding: 16px;
    background: rgba(255,255,255,0.03);
    border: 1px dashed #444;
    border-radius: var(--radius-md);
    margin-top: 8px;
  }
  .completed-title { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 4px; }
  .completed-sub { font-size: 13px; color: #888; margin-bottom: 10px; }

  .sets-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .sets-table th {
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    padding: 6px 0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
  }
  .sets-table th:first-child { width: 26px; }
  .sets-table td { text-align: center; padding: 4px 2px; font-size: 14px; font-weight: 700; }
  .sets-table input {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border-light);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 10px 4px;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
  }
  .sets-table input:focus { outline: none; border-color: var(--accent); background: var(--surface-3); }

  .set-btns { display: flex; gap: 8px; margin-top: 12px; }
  .set-btns button {
    flex: 1;
    background: var(--surface-2);
    color: #fff;
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    padding: 10px;
    font-size: 13px;
    font-weight: 600;
  }
  .set-btns button.remove { border-color: #444; color: #999; }

  .today-card {
    background: linear-gradient(155deg, #181818, #0a0a0a);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: var(--radius-lg);
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .today-card .split { font-size: 24px; font-weight: 800; margin: 4px 0 14px; letter-spacing: -0.3px; }
  .today-card.rest .split { font-size: 22px; color: #aaa; }

  .schedule-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    margin-bottom: 8px;
    transition: background var(--transition), border-color var(--transition);
  }
  .schedule-card.tappable { cursor: pointer; }
  .schedule-card.tappable:active { background: var(--surface-2); border-color: var(--border-light); }
  .schedule-card .split { font-size: 17px; font-weight: 700; margin-top: 2px; }
  .schedule-card.rest .split { color: #777; font-weight: 600; }

  /* Calendar */
  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 12px;
  }
  .cal-nav-btn {
    padding: 8px 16px;
    background: var(--surface-2);
    color: #fff;
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    font-size: 18px;
    line-height: 1;
  }
  #calTitle { font-weight: 800; font-size: 16px; }
  .cal-dow {
    margin: 12px 0 8px;
    display: flex;
    text-align: center;
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .cal-dow div { flex: 1; }
  #calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    text-align: center;
  }
  .cal-cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    color: #bbb;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    cursor: default;
    position: relative;
  }
  .cal-cell.workout { cursor: pointer; }
  .cal-cell.workout:active { background: var(--surface-2); }
  .cal-cell.logged { background: #fff; color: #000; font-weight: 800; }
  .cal-cell.today { border-color: #fff; color: #fff; }
  .cal-cell.today.logged { border-color: #000; }
  .cal-cell.rest { color: #444; }

  /* Weight list */
  .weight-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    padding: 8px 2px;
    border-bottom: 1px solid var(--border);
  }
  .weight-row:last-child { border-bottom: none; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px;
    margin-bottom: 10px;
  }
  .stat-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .stat-card-icon {
    width: 38px;
    height: 38px;
    border-radius: var(--radius-sm);
    background: #000;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .stat-card-name { font-weight: 700; font-size: 15px; line-height: 1.2; }
  .stat-card-trend { font-size: 12px; margin-top: 2px; }
  .stat-history-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #ccc;
    padding: 6px 0;
    border-bottom: 1px solid #151515;
  }
  .stat-history-row:last-child { border-bottom: none; }
  .overview-exercise {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px;
    margin-bottom: 8px;
  }
  .overview-exercise-name { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .overview-set { font-size: 13px; color: #bbb; margin-top: 3px; }
  .overview-day-title { color: #fff; font-weight: 800; font-size: 15px; margin: 10px 0 6px; }

  .center-btn {
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    text-align: center !important;
    vertical-align: middle;
    padding: 0;
  }

  .save-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(12,12,12,0.97);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    z-index: 16;
  }
  .save-bar button {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 700;
  }
  .save-bar .save { background: #fff; color: #000; }
  .save-bar .template { background: var(--surface-2); color: #ccc; border: 1px solid var(--border-light); }

  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    background: rgba(10,10,10,0.96);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-top: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    z-index: 15;
    padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
    width: 100%; 
    left: 0; 
    right: 0;
  }
  .bottom-nav button {
    flex: 1;
    background: none;
    border: none;
    color: #666;
    padding: 6px 0 4px;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border-radius: 12px;
  }
  .bottom-nav button svg {
    width: 21px;
    height: 21px;
    opacity: 0.55;
    transition: opacity var(--transition);
  }
  .bottom-nav button.active {
    color: #fff;
    background: rgba(255,255,255,0.08);
  }
  .bottom-nav button.active svg { opacity: 1; }

  #updateBanner {
    display: none;
    position: fixed;
    bottom: 74px;
    left: 12px;
    right: 12px;
    background: #ffffff;
    color: #000;
    padding: 13px 16px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 700;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    text-align: center;
    cursor: pointer;
  }
  #updateBanner span { display: block; font-size: 11.5px; font-weight: 600; color: #444; margin-top: 2px; }

  #loadingScreen {
    position: fixed;
    inset: 0;
    background: #000000;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease;
  }
  #loadingScreen img { width: 140px; height: 140px; }
  #loadingScreen .loading-label {
    color: #ffffff;
    font-weight: 800;
    letter-spacing: 1.5px;
    font-size: 14px;
    margin-top: 14px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="loadingScreen">
  <img src="snake-loading.gif" alt="Loading">
  <div class="loading-label">Rat Tracker</div>
</div>

<div id="updateBanner">New version available — tap to update<span>Rat Tracker will reload with the latest changes</span></div>

<div class="page active" id="page-today">
  <div id="todayCard"></div>
  <div class="section-label">Upcoming Schedule</div>
  <div id="upcomingList"></div>
</div>

<div class="page" id="page-calendar">
  <div class="cal-header">
    <button id="prevMonth" class="cal-nav-btn">‹</button>
    <div id="calTitle"></div>
    <button id="nextMonth" class="cal-nav-btn">›</button>
  </div>
  <div class="cal-dow">
    <div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div><div>S</div>
  </div>
  <div id="calendar"></div>
</div>

<div class="page" id="page-stats">
  <div id="bodyWeightSection" class="panel">
    <div class="panel-title">Track Body Weight</div>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <input type="number" inputmode="decimal" id="bodyWeightInput" placeholder="kg" class="input-field">
      <button id="logWeightBtn" class="btn-primary" style="width:auto;padding:0 22px;">Log</button>
    </div>
    <div id="bodyWeightList" style="max-height:160px;overflow-y:auto;"></div>
  </div>
  <div id="statsBody"></div>
</div>

<div class="bottom-nav" id="bottomNav">
  <button class="nav-btn active" data-page="today">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    <span>Today</span>
  </button>
  <button class="nav-btn" data-page="calendar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    <span>Calendar</span>
  </button>
  <button class="nav-btn" data-page="stats">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    <span>Stats</span>
  </button>
</div>

<div id="sessionModal" class="modal-overlay">
  <div class="modal-sheet" style="background:#0a0a0a;width:100%;max-height:92vh;display:flex;flex-direction:column;border-radius:18px 18px 0 0;overflow:hidden;border-top:1px solid var(--border);">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div id="sessionDate" class="modal-date"></div>
        <div id="sessionTitle" class="modal-title"></div>
      </div>
      <button id="cancelSession" class="btn-icon center-btn">×</button>
    </div>
    <div id="sessionExercises" style="overflow-y:auto;padding:4px 16px 14px;flex:1;"></div>
    <div class="save-bar" id="saveBar" style="position:static;padding-bottom:12px;">
      <button class="template" id="saveTemplateBtn">Save Template</button>
      <button class="save" id="saveSession">Finish Workout</button>
    </div>
  </div>
</div>

<div id="overviewModal" class="modal-overlay">
  <div class="modal-sheet panel" style="width:100%;max-height:84vh;overflow-y:auto;border-radius:18px 18px 0 0;margin:0;padding:16px;">
    <div class="modal-handle" style="margin-top:0;"></div>
    <div class="modal-header" style="padding:0 0 12px;margin-bottom:4px;">
      <div id="overviewTitle" class="modal-title"></div>
      <button id="closeOverview" class="btn-icon center-btn">×</button>
    </div>
    <div id="overviewBody"></div>
    <button id="logAgainBtn" class="btn-secondary" style="display:none;margin-top:14px;">Log this workout again</button>
    <button id="deleteLogBtn" class="btn-ghost" style="display:none;width:100%;margin-top:10px;">Delete this workout</button>
  </div>
</div>

<script>
// ---------- APP VERSION / AUTO UPDATE ----------
const APP_VERSION = "1.0.5";

function checkForUpdate() {
  fetch('./version.json?t=' + Date.now(), { cache: 'no-store' })
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (data && data.version && data.version !== APP_VERSION) {
        document.getElementById('updateBanner').style.display = 'block';
      }
    })
    .catch(() => { /* offline, or opened as a local file — silently ignore */ });
}
document.getElementById('updateBanner').onclick = () => {
  location.href = location.pathname + '?v=' + Date.now();
};
checkForUpdate();
setInterval(checkForUpdate, 5 * 60 * 1000); // re-check every 5 minutes while the app is open

// ---------- DATA ----------
const WORKOUTS = {
  "Push (Home)": [
    { name: "Deep Pushups", target: "12–20", sets: 3, rpe: [9,10], rest: 120, cat: "chest", note: "Lower until your chest is well below your hands — use blocks or handles for extra range." },
    { name: "Feet-Elevated Pushups", target: "10–15", sets: 3, rpe: [9,10], rest: 120, cat: "chest", note: "Feet up on a chair or step to shift more load onto the upper chest." },
    { name: "Barbell Overhead Press", target: "6–10", sets: 3, rpe: [8,9], rest: 120, cat: "shoulders", note: "Brace your core, press straight overhead without leaning back." },
    { name: "Dumbbell Lateral Raises (Unilateral)", target: "10–15", sets: 3, rpe: [9,9], rest: 90, cat: "shoulders", note: "One arm at a time, slight elbow bend, lead with the elbow." },
    { name: "Single-Arm Overhead Tricep Extension", target: "10–12", sets: 3, rpe: [8,9], rest: 90, cat: "triceps", note: "Keep the elbow close to your head, one arm at a time for full stretch." }
  ],
  "Pull (Home)": [
    { name: "Barbell Bent-Over Row", target: "8–12", sets: 3, rpe: [8,9], rest: 120, cat: "back", note: "Flat back, pull to your lower ribs, control the negative." },
    { name: "Single-Arm DB Row", target: "8–12", sets: 3, rpe: [8,9], rest: 120, cat: "back", note: "Brace on a chair or bench, pull the elbow back and up along your side." },
    { name: "Barbell Romanian Deadlift", target: "6–10", sets: 3, rpe: [8,9], rest: 120, cat: "hamstrings", note: "Soft knees, hinge at the hips, bar stays close to your legs." },
    { name: "DB Preacher Curl", target: "10–12", sets: 3, rpe: [9,9], rest: 90, cat: "biceps", note: "Brace the back of your arm against a flat surface for strict form." },
    { name: "Single-Arm Reverse DB Curls", target: "12–15", sets: 2, rpe: [9,9], rest: 60, cat: "forearms", note: "Palm down through the whole curl, one arm at a time." },
    { name: "Dumbbell Rear Delt Fly (Unilateral)", target: "12–15", sets: 2, rpe: [9,9], rest: 90, cat: "shoulders", note: "Hinge forward, raise one arm at a time with a slight elbow bend." }
  ],
  "Legs (Home)": [
    { name: "Barbell Squat", target: "6–10", sets: 2, rpe: [8,9], rest: 180, cat: "quads", note: "Bar on your back, squat to depth, drive up through your heels." },
    { name: "Barbell Romanian Deadlift", target: "8–12", sets: 2, rpe: [8,9], rest: 120, cat: "hamstrings", note: "Soft knees, hinge at the hips, feel the stretch in your hamstrings." },
    { name: "Bulgarian Split Squat", target: "8–12", sets: 2, rpe: [9,9], rest: 120, cat: "quads", note: "Rear foot elevated on a chair or step, drive through the front heel." },
    { name: "Lateral Lunges (holding DB)", target: "10–12", sets: 2, rpe: [9,9], rest: 90, cat: "quads", note: "Step wide, sit back into the working leg, keep the other straight." },
    { name: "Standing Calf Raises", target: "15–20", sets: 3, rpe: [9,9], rest: 60, cat: "calves", note: "Full stretch at the bottom, pause and squeeze at the top of each rep." }
  ]
};

const CATEGORY_META = {
  chest:      { color: "#ffffff", label: "Chest" },
  back:       { color: "#ffffff", label: "Back" },
  shoulders:  { color: "#ffffff", label: "Shoulders" },
  triceps:    { color: "#ffffff", label: "Triceps" },
  biceps:     { color: "#ffffff", label: "Biceps" },
  forearms:   { color: "#ffffff", label: "Forearms" },
  quads:      { color: "#ffffff", label: "Quads" },
  hamstrings: { color: "#ffffff", label: "Hamstrings" },
  calves:     { color: "#ffffff", label: "Calves" },
  abs:        { color: "#ffffff", label: "Abs" },
  lowerback:  { color: "#ffffff", label: "Lower Back" },
  hips:       { color: "#ffffff", label: "Hips" }
};

function exerciseIconSVG(cat, size) {
  size = size || 30;
  const meta = CATEGORY_META[cat] || { color: "#555", label: "" };
  const c = meta.color;
  const G = "#222222";
  let highlight = "";
  switch (cat) {
    case "chest": highlight = `<rect x="13" y="15" width="14" height="7" rx="3" fill="${c}"/>`; break;
    case "back": highlight = `<rect x="13" y="15" width="14" height="7" rx="3" fill="none" stroke="${c}" stroke-width="2.2"/>`; break;
    case "shoulders": highlight = `<circle cx="9" cy="15" r="4" fill="${c}"/><circle cx="31" cy="15" r="4" fill="${c}"/>`; break;
    case "triceps": highlight = `<rect x="6" y="14" width="6" height="9" rx="3" fill="none" stroke="${c}" stroke-width="2.2"/><rect x="28" y="14" width="6" height="9" rx="3" fill="none" stroke="${c}" stroke-width="2.2"/>`; break;
    case "biceps": highlight = `<rect x="6" y="14" width="6" height="9" rx="3" fill="${c}"/><rect x="28" y="14" width="6" height="9" rx="3" fill="${c}"/>`; break;
    case "forearms": highlight = `<rect x="6" y="23" width="6" height="9" rx="3" fill="${c}"/><rect x="28" y="23" width="6" height="9" rx="3" fill="${c}"/>`; break;
    case "quads": highlight = `<rect x="13" y="32" width="7" height="9" rx="3" fill="${c}"/><rect x="20" y="32" width="7" height="9" rx="3" fill="${c}"/>`; break;
    case "hamstrings": highlight = `<rect x="13" y="32" width="7" height="9" rx="3" fill="none" stroke="${c}" stroke-width="2.2"/><rect x="20" y="32" width="7" height="9" rx="3" fill="none" stroke="${c}" stroke-width="2.2"/>`; break;
    case "calves": highlight = `<rect x="14" y="41" width="5" height="8" rx="2.5" fill="${c}"/><rect x="21" y="41" width="5" height="8" rx="2.5" fill="${c}"/>`; break;
    case "abs": highlight = `<rect x="16" y="22" width="8" height="8" rx="2" fill="${c}"/>`; break;
    case "lowerback": highlight = `<rect x="15" y="27" width="10" height="4" rx="1" fill="${c}"/>`; break;
    case "hips": highlight = `<circle cx="11" cy="31" r="3" fill="${c}"/><circle cx="29" cy="31" r="3" fill="${c}"/>`; break;
  }
  return `<svg viewBox="0 0 40 50" width="${size}" height="${size}">
    <circle cx="20" cy="7" r="5" fill="${G}"/>
    <rect x="13" y="13" width="14" height="18" rx="5" fill="${G}"/>
    <rect x="6" y="14" width="6" height="17" rx="3" fill="${G}"/>
    <rect x="28" y="14" width="6" height="17" rx="3" fill="${G}"/>
    <rect x="13" y="30" width="7" height="19" rx="3" fill="${G}"/>
    <rect x="20" y="30" width="7" height="19" rx="3" fill="${G}"/>
    ${highlight}
  </svg>`;
}

const EXERCISE_CAT = {};
Object.values(WORKOUTS).forEach(list => list.forEach(ex => { EXERCISE_CAT[ex.name] = ex.cat; }));

const SCHEDULE = { 0: "Push (Home)", 1: "Pull (Home)", 2: "Legs (Home)", 3: "Push (Home)", 4: "Pull (Home)", 5: "Legs (Home)", 6: null };
const DOW_NAMES = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

function mondayIndex(jsDay) { return (jsDay + 6) % 7; }

// ---------- STORAGE ----------
function loadLogs() { try { return JSON.parse(localStorage.getItem('gymLogs') || '{}'); } catch(e) { return {}; } }
function saveLogs(logs) { localStorage.setItem('gymLogs', JSON.stringify(logs)); }
let logs = loadLogs();

function loadLastUsed() { try { return JSON.parse(localStorage.getItem('gymLastUsed') || '{}'); } catch(e) { return {}; } }
function saveLastUsed(lu) { localStorage.setItem('gymLastUsed', JSON.stringify(lu)); }
let lastUsed = loadLastUsed();

function todayStr(d = new Date()) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ---------- BOTTOM NAV ----------
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('page-today').classList.remove('active');
    document.getElementById('page-calendar').classList.remove('active');
    document.getElementById('page-stats').classList.remove('active');
    document.getElementById('page-' + btn.dataset.page).classList.add('active');
    if (btn.dataset.page === 'calendar') renderCalendar();
    if (btn.dataset.page === 'today') renderToday();
    if (btn.dataset.page === 'stats') renderStats();
  });
});

function renderToday() {
  const today = new Date();
  const mIdx = mondayIndex(today.getDay());
  const dStr = todayStr();
  const todaysWorkout = SCHEDULE[mIdx];
  const alreadyDone = logs[dStr] && logs[dStr].some(s => s.day === todaysWorkout);

  const todayCard = document.getElementById('todayCard');
  if (todaysWorkout) {
    todayCard.innerHTML = `
      <div class="today-card">
        <div class="card-meta">Today · ${DOW_NAMES[mIdx]}</div>
        <div class="split">${todaysWorkout}</div>
        ${alreadyDone ? '<div class="status-badge done">✓ Logged today</div>' : ''}
        <button id="startTodayBtn" class="btn-primary">${alreadyDone ? 'View / Log Again' : 'Start Workout'}</button>
      </div>`;
    document.getElementById('startTodayBtn').onclick = () => {
      if (alreadyDone) showDayLogs(dStr, todaysWorkout);
      else startSession(todaysWorkout, dStr);
    };
  } else {
    todayCard.innerHTML = `<div class="today-card rest"><div class="card-meta">Today · ${DOW_NAMES[mIdx]}</div><div class="split">Rest Day</div></div>`;
  }

  const listEl = document.getElementById('upcomingList');
  listEl.innerHTML = '';
  for (let i = 1; i <= 7; i++) {
    const d = new Date(today.getTime() + i * 24 * 60 * 60 * 1000);
    const idx = mondayIndex(d.getDay());
    const workout = SCHEDULE[idx];
    const dateStr = todayStr(d);
    const row = document.createElement('div');
    row.className = 'schedule-card' + (workout ? ' tappable' : ' rest');
    if (workout) {
      const logged = logs[dateStr] && logs[dateStr].some(s => s.day === workout);
      row.innerHTML = `
        <div class="card-meta">${i === 1 ? 'Tomorrow' : DOW_NAMES[idx]} · ${dateStr.slice(5)}</div>
        <div class="split">${workout}</div>
        <div class="card-hint">${logged ? '✓ Logged — tap to view' : 'Tap to preview or start'}</div>`;
      row.onclick = () => {
        if (logged) showDayLogs(dateStr, workout);
        else startSession(workout, dateStr);
      };
    } else {
      row.innerHTML = `<div class="card-meta">${i === 1 ? 'Tomorrow' : DOW_NAMES[idx]} · ${dateStr.slice(5)}</div><div class="split">Rest Day</div>`;
    }
    listEl.appendChild(row);
  }
}

// ---------- SESSION TIMERS ----------
let currentSessionDay = null;
let currentSessionDate = null;
let exerciseTimers = {};

function clearAllTimers() {
  Object.values(exerciseTimers).forEach(t => { if (t.intervalId) clearInterval(t.intervalId); });
  exerciseTimers = {};
}

function formatMMSS(totalSeconds) {
  totalSeconds = Math.max(0, Math.round(totalSeconds));
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  return m + ':' + String(s).padStart(2, '0');
}

function initExerciseTimer(i, ex) {
  exerciseTimers[i] = { state: 'idle', currentSet: 1, totalSets: ex.sets, restSeconds: ex.rest || 90, elapsed: 0, remaining: 0, graceRemaining: 0, intervalId: null };
}

function renderTimerPanel(i) {
  const t = exerciseTimers[i];
  const displayEl = document.getElementById('timerDisplay-' + i);
  const subEl = document.getElementById('timerSub-' + i);
  const btnEl = document.getElementById('timerBtn-' + i);
  if (!t || !displayEl || !subEl || !btnEl) return;

  if (t.state === 'idle') {
    const finished = t.currentSet > t.totalSets;
    displayEl.textContent = finished ? 'Done' : '0:00';
    subEl.textContent = finished ? 'All sets complete' : ('Set ' + t.currentSet + ' of ' + t.totalSets);
    btnEl.textContent = finished ? 'Mark Exercise Done' : 'Start Set ' + t.currentSet;
    btnEl.disabled = false; btnEl.style.opacity = '1';
  } else if (t.state === 'grace') {
    displayEl.textContent = String(t.graceRemaining);
    subEl.textContent = 'Get ready…';
    btnEl.textContent = 'Starting…';
    btnEl.disabled = true; btnEl.style.opacity = '0.6';
  } else if (t.state === 'running') {
    displayEl.textContent = formatMMSS(t.elapsed);
    subEl.textContent = 'Set ' + t.currentSet + ' running';
    btnEl.textContent = 'End Set ' + t.currentSet;
    btnEl.disabled = false; btnEl.style.opacity = '1';
  } else if (t.state === 'resting') {
    displayEl.textContent = formatMMSS(t.remaining);
    subEl.textContent = 'Resting — next: Set ' + t.currentSet;
    btnEl.textContent = 'Skip Rest';
    btnEl.disabled = false; btnEl.style.opacity = '1';
  }
}

function timerButtonClick(i) {
  const t = exerciseTimers[i]; if (!t) return;
  if (t.state === 'idle') {
    if (t.currentSet > t.totalSets) t.currentSet = 1;
    t.state = 'grace'; t.graceRemaining = 2;
    renderTimerPanel(i);
    if (t.intervalId) clearInterval(t.intervalId);
    t.intervalId = setInterval(() => {
      t.graceRemaining--;
      if (t.graceRemaining <= 0) {
        clearInterval(t.intervalId);
        t.state = 'running'; t.elapsed = 0;
        renderTimerPanel(i);
        t.intervalId = setInterval(() => { t.elapsed++; renderTimerPanel(i); }, 1000);
      } else { renderTimerPanel(i); }
    }, 1000);
  } else if (t.state === 'running') {
    if (t.intervalId) clearInterval(t.intervalId);
    t.state = 'resting'; t.remaining = t.restSeconds;
    renderTimerPanel(i);
    t.intervalId = setInterval(() => {
      t.remaining--;
      if (t.remaining <= 0) {
        clearInterval(t.intervalId); t.intervalId = null;
        t.currentSet++; t.state = 'idle'; renderTimerPanel(i);
      } else { renderTimerPanel(i); }
    }, 1000);
  } else if (t.state === 'resting') {
    if (t.intervalId) clearInterval(t.intervalId); t.intervalId = null;
    t.currentSet++; t.state = 'idle'; renderTimerPanel(i);
  }
}

// ---------- SHINY DONE & EDIT STATE HANDLING ----------
function startSession(dayName, dateStr) {
  clearAllTimers();
  currentSessionDay = dayName;
  currentSessionDate = dateStr || todayStr();
  const exercises = WORKOUTS[dayName];
  document.getElementById('sessionDate').textContent = currentSessionDate;
  document.getElementById('sessionTitle').textContent = dayName;
  const container = document.getElementById('sessionExercises');
  container.innerHTML = '';

  exercises.forEach((ex, i) => {
    const card = document.createElement('div');
    card.className = 'exercise-card';
    card.id = 'exCard-' + i;
    card.dataset.exIndex = i;
    card.dataset.exName = ex.name;

    const key = dayName + '||' + ex.name;
    const saved = (lastUsed[key] && lastUsed[key].sets) || [];
    let rows = '';
    const numSets = ex.sets;
    const rpeTargets = ex.rpe || [];
    for (let s = 0; s < numSets; s++) {
      const prevW = saved[s] ? saved[s].w : '';
      const prevR = saved[s] ? saved[s].r : '';
      const prevRpe = saved[s] && saved[s].rpe ? saved[s].rpe : '';
      const rpePlaceholder = rpeTargets[s] !== undefined ? 'RPE ' + rpeTargets[s] : 'RPE';
      rows += `<tr>
        <td style="font-size:14px; font-weight:bold;">${s+1}</td>
        <td><input type="number" inputmode="decimal" class="w-input" value="${prevW}" placeholder="kg"></td>
        <td><input type="number" inputmode="numeric" class="r-input" value="${prevR}" placeholder="reps"></td>
        <td><input type="number" inputmode="decimal" step="0.5" class="rpe-input" value="${prevRpe}" placeholder="${rpePlaceholder}"></td>
      </tr>`;
    }

    const rpeRangeText = rpeTargets.length ? ('RPE ' + rpeTargets.join('-')) : '';
    const catMeta = CATEGORY_META[ex.cat] || { label: '' };

    card.innerHTML = `
      <div class="exercise-name">${ex.name}</div>
      <div class="exercise-target">Target: ${ex.target}${rpeRangeText ? ' · ' + rpeRangeText : ''}</div>

      <div class="interactive-box" id="interactiveBox-${i}">
        ${ex.note ? `<div style="font-size:12px;line-height:1.4;color:#aaa;background:#131313;border-left:3px solid #fff;padding:6px 8px;margin:4px 0 10px;">${ex.note}</div>` : ''}
        <div style="display:flex;gap:12px;align-items:center;margin-top:6px;">
          <div style="width:75px;flex-shrink:0;text-align:center;">
            <div style="width:100%;aspect-ratio:1;border-radius:12px;background:#000;display:flex;align-items:center;justify-content:center;padding:8%;">
              ${exerciseIconSVG(ex.cat, '100%')}
            </div>
            <div style="font-size:10px;color:#888;margin-top:4px;font-weight:bold;">${catMeta.label}</div>
          </div>
          <div style="flex:1;min-width:0;">
            <table class="sets-table">
              <tr><th>Set</th><th>Kg</th><th>Reps</th><th>RPE</th></tr>
              ${rows}
            </table>
          </div>
        </div>
        <div class="set-btns">
          <button class="add-set">+ Add Set</button>
          <button class="remove remove-set">− Remove Set</button>
        </div>
        <div style="margin-top:10px;background:#000;border:1px solid #222;border-radius:12px;padding:10px;">
          <div id="timerDisplay-${i}" style="font-size:32px;font-weight:800;text-align:center;font-variant-numeric:tabular-nums;color:#fff;">0:00</div>
          <div id="timerSub-${i}" style="font-size:13px;color:#888;text-align:center;margin-bottom:6px;">Set 1 of ${ex.sets}</div>
          <button id="timerBtn-${i}" style="width:100%;padding:12px;background:#fff;color:#000;border:none;border-radius:8px;font-weight:700;font-size:14px;">Start Set 1</button>
        </div>
      </div>

      <div class="completed-gui-box" id="completedBox-${i}" style="display:none;text-align:center;padding:12px;background:rgba(255,255,255,0.03);border:1px dashed #555;border-radius:12px;margin-top:6px;">
        <div style="font-size:18px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;">✓ Done!</div>
        <div style="font-size:13px;color:#aaa;margin-bottom:8px;">Muscular Failure stats logged & saved.</div>
        <button class="action-edit-btn" id="actionEditBtn-${i}" style="padding:6px 18px;background:#000;border:1px solid #fff;color:#eee;font-size:13px;font-weight:700;border-radius:6px;">Edit Stats</button>
      </div>
    `;
    container.appendChild(card);

    initExerciseTimer(i, ex);
    document.getElementById('timerBtn-' + i).addEventListener('click', () => {
      const t = exerciseTimers[i];
      if (t && t.state === 'idle' && t.currentSet > t.totalSets) {
        card.classList.remove('card-completed-flash');
        void card.offsetWidth;
        card.classList.add('card-completed-flash');
        document.getElementById('interactiveBox-' + i).style.display = 'none';
        document.getElementById('completedBox-' + i).style.display = 'block';
      } else {
        timerButtonClick(i);
      }
    });

    document.getElementById('actionEditBtn-' + i).onclick = () => {
      card.classList.remove('card-completed-flash');
      document.getElementById('completedBox-' + i).style.display = 'none';
      document.getElementById('interactiveBox-' + i).style.display = 'block';
    };

    card.querySelector('.add-set').onclick = () => {
      const table = card.querySelector('.sets-table');
      const setNum = table.querySelectorAll('tr').length;
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${setNum}</td>
        <td><input type="number" inputmode="decimal" class="w-input" placeholder="kg"></td>
        <td><input type="number" inputmode="numeric" class="r-input" placeholder="reps"></td>
        <td><input type="number" inputmode="decimal" step="0.5" class="rpe-input" placeholder="RPE"></td>`;
      table.appendChild(tr);

      if(exerciseTimers[i]) {
        exerciseTimers[i].totalSets = table.querySelectorAll('tr').length - 1;
        renderTimerPanel(i);
      }
    };
    card.querySelector('.remove-set').onclick = () => {
      const table = card.querySelector('.sets-table');
      const rowsEls = table.querySelectorAll('tr');
      if (rowsEls.length > 2) {
        rowsEls[rowsEls.length-1].remove();
        if(exerciseTimers[i]) {
          exerciseTimers[i].totalSets = table.querySelectorAll('tr').length - 1;
          renderTimerPanel(i);
        }
      }
    };
  });

  document.getElementById('sessionModal').style.display = 'flex';
}

function closeSessionModal() {
  clearAllTimers();
  document.getElementById('sessionModal').style.display = 'none';
}

document.getElementById('cancelSession').onclick = closeSessionModal;

document.getElementById('saveTemplateBtn').onclick = () => {
  const container = document.getElementById('sessionExercises');
  const cards = container.querySelectorAll('.exercise-card');
  let count = 0;

  cards.forEach(card => {
    const name = card.dataset.exName;
    const wInputs = card.querySelectorAll('.w-input');
    const rInputs = card.querySelectorAll('.r-input');
    const rpeInputs = card.querySelectorAll('.rpe-input');
    const sets = [];
    wInputs.forEach((w, idx) => {
      const wv = w.value.trim();
      const rv = rInputs[idx].value.trim();
      const rpv = rpeInputs[idx] ? rpeInputs[idx].value.trim() : '';
      if (wv !== '' || rv !== '' || rpv !== '') sets.push({ w: wv, r: rv, rpe: rpv });
    });
    if (sets.length > 0) {
      lastUsed[currentSessionDay + '||' + name] = { sets };
      count++;
    }
  });

  if (count === 0) { alert('Fill in stats before saving template!'); return; }
  saveLastUsed(lastUsed);
  alert('Template saved!');
};

document.getElementById('saveSession').onclick = () => {
  const container = document.getElementById('sessionExercises');
  const cards = container.querySelectorAll('.exercise-card');
  const date = currentSessionDate || todayStr();
  const entry = [];

  cards.forEach(card => {
    const name = card.dataset.exName;
    const target = WORKOUTS[currentSessionDay].find(e => e.name === name).target;
    const wInputs = card.querySelectorAll('.w-input');
    const rInputs = card.querySelectorAll('.r-input');
    const rpeInputs = card.querySelectorAll('.rpe-input');
    const sets = [];
    wInputs.forEach((w, idx) => {
      const wv = w.value.trim();
      const rv = rInputs[idx].value.trim();
      const rpv = rpeInputs[idx] ? rpeInputs[idx].value.trim() : '';
      if (wv !== '' || rv !== '' || rpv !== '') sets.push({ w: wv, r: rv, rpe: rpv });
    });
    if (sets.length > 0) {
      entry.push({ name, target, sets });
      lastUsed[currentSessionDay + '||' + name] = { sets };
    }
  });

  if (entry.length === 0) { alert('Track at least one set before finishing!'); return; }
  if (!logs[date]) logs[date] = [];
  const existingIdx = logs[date].findIndex(s => s.day === currentSessionDay);
  const record = { day: currentSessionDay, exercises: entry, time: new Date().toISOString() };

  if (existingIdx >= 0) logs[date][existingIdx] = record;
  else logs[date].push(record);

  saveLogs(logs);
  saveLastUsed(lastUsed);
  alert('Workout complete!');
  closeSessionModal();
  if (document.getElementById('page-today').classList.contains('active')) renderToday();
  if (document.getElementById('page-calendar').classList.contains('active')) renderCalendar();
};

// ---------- WEIGHT & STATS ----------
function loadBodyWeights() { try { return JSON.parse(localStorage.getItem('bodyWeightLogs') || '[]'); } catch (e) { return []; } }
function saveBodyWeights(list) { localStorage.setItem('bodyWeightLogs', JSON.stringify(list)); }

function renderBodyWeightList() {
  const list = loadBodyWeights().slice().sort((a, b) => b.date.localeCompare(a.date));
  const el = document.getElementById('bodyWeightList');
  if (list.length === 0) {
    el.innerHTML = '<div style="font-size:13px;color:#555;text-align:center;padding:6px 0;">No history recorded</div>';
    return;
  }
  let html = '';
  list.forEach((entry) => {
    html += `<div style="display:flex;justify-content:space-between;align-items:center;font-size:14px;padding:6px 2px;border-bottom:1px solid #1c1c1c;">
      <span style="color:#888;">${entry.date}</span>
      <span style="display:flex;align-items:center;gap:8px;">
        <b style="color:#eee;">${entry.weight} kg</b>
        <button class="delete-bw center-btn" data-date="${entry.date}" style="background:none;border:none;color:#666;font-size:16px;width:20px;height:20px;">×</button>
      </span>
    </div>`;
  });
  el.innerHTML = html;
  el.querySelectorAll('.delete-bw').forEach(btn => {
    btn.onclick = () => {
      const updated = loadBodyWeights().filter(e => e.date !== btn.dataset.date);
      saveBodyWeights(updated);
      renderBodyWeightList();
    };
  });
}

document.getElementById('logWeightBtn').onclick = () => {
  const input = document.getElementById('bodyWeightInput');
  const val = parseFloat(input.value); if (!val || val <= 0) return;
  const list = loadBodyWeights();
  const today = todayStr();
  const existingIdx = list.findIndex(e => e.date === today);
  if (existingIdx >= 0) list[existingIdx].weight = val;
  else list.push({ date: today, weight: val });
  saveBodyWeights(list);
  input.value = '';
  renderBodyWeightList();
};

function renderStats() {
  renderBodyWeightList();
  const el = document.getElementById('statsBody');
  const byExercise = {};
  const dates = Object.keys(logs).sort();
  let totalSessions = 0;

  dates.forEach(date => {
    logs[date].forEach(session => {
      totalSessions++;
      session.exercises.forEach(ex => {
        if (!ex.sets || ex.sets.length === 0) return;
        let best = ex.sets[0];
        ex.sets.forEach(s => {
          if ((parseFloat(s.w)||0) > (parseFloat(best.w)||0)) best = s;
        });
        if (!byExercise[ex.name]) byExercise[ex.name] = [];
        byExercise[ex.name].push({ date, w: best.w, r: best.r, rpe: best.rpe });
      });
    });
  });

  const exNames = Object.keys(byExercise).sort();
  if (exNames.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:#666;padding:40px 10px;font-size:15px;">No workouts logged yet.</div>';
    return;
  }

  el.innerHTML = `<div style="background:#0d0d0d;border:1px solid #151515;border-radius:14px;padding:14px;margin-bottom:12px;text-align:center;"><div style="font-size:26px;font-weight:800;color:#fff;">${totalSessions}</div><div style="font-size:13px;color:#888;">Total logged workouts</div></div>`;

  exNames.forEach(name => {
    const history = byExercise[name];
    const diff = (parseFloat(history[history.length - 1].w)||0) - (parseFloat(history[0].w)||0);
    let lbl = history.length > 1 ? (diff > 0 ? `▲ +${diff}kg` : diff < 0 ? `▼ ${diff}kg` : 'stagnant') : 'First session';

    let historyRows = '';
    history.slice().reverse().slice(0, 6).forEach(h => {
      historyRows += `<div style="display:flex;justify-content:space-between;font-size:14px;color:#ccc;padding:4px 0;border-bottom:1px solid #151515;">
        <span style="color:#666;">${h.date}</span>
        <span><b>${h.w||'-'}kg</b> × ${h.r||'-'}${h.rpe ? ' · RPE '+h.rpe : ''}</span>
      </div>`;
    });

    const box = document.createElement('div');
    box.style.cssText = 'background:#0d0d0d;border:1px solid #1c1c1c;border-radius:14px;padding:12px;margin-bottom:10px;';
    box.innerHTML = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
      <div style="width:36px;height:36px;border-radius:8px;background:#000;display:flex;align-items:center;justify-content:center;">${exerciseIconSVG(EXERCISE_CAT[name])}</div>
      <div><div style="font-weight:700;font-size:15px;">${name}</div><div style="font-size:12px;color:#aaa;">${lbl}</div></div>
    </div>${historyRows}`;
    el.appendChild(box);
  });
}

// ---------- CALENDAR ----------
let calYear = new Date().getFullYear(), calMonth = new Date().getMonth();

function renderCalendar() {
  const el = document.getElementById('calendar');
  document.getElementById('calTitle').textContent = ["January","February","March","April","May","June","July","August","September","October","November","December"][calMonth] + ' ' + calYear;
  el.innerHTML = '';

  const first = mondayIndex(new Date(calYear, calMonth, 1).getDay());
  const totalDays = new Date(calYear, calMonth+1, 0).getDate();
  const today = todayStr();

  for (let i = 0; i < first; i++) el.appendChild(document.createElement('div'));

  for (let d = 1; d <= totalDays; d++) {
    const dStr = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const sch = SCHEDULE[mondayIndex(new Date(calYear, calMonth, d).getDay())];
    const cell = document.createElement('div');
    cell.style.cssText = "padding: 12px 0; font-size: 15px; font-weight: 600; color: #ccc; cursor: pointer; border-radius: 8px; margin: 2px;";

    if (logs[dStr] && logs[dStr].length > 0) {
      cell.style.background = "#fff";
      cell.style.color = "#000";
    }
    if (dStr === today) {
      cell.style.border = "2px solid #fff";
    }

    cell.textContent = d;
    cell.onclick = () => {
      if (logs[dStr] && logs[dStr].length > 0) showDayLogs(dStr, sch);
      else if (sch) startSession(sch, dStr);
    };
    el.appendChild(cell);
  }
}

function showDayLogs(dateStr, scheduled) {
  document.getElementById('overviewTitle').textContent = dateStr;
  let html = '';
  logs[dateStr].forEach(session => {
    html += `<div style="color:#fff;font-weight:bold;font-size:15px;margin:8px 0;">${session.day}</div>`;
    session.exercises.forEach(ex => {
      html += `<div style="background:#111;border-radius:12px;padding:10px;margin-bottom:8px;"><div style="font-weight:bold;font-size:14px;margin-bottom:4px;">${ex.name}</div>`;
      ex.sets.forEach((s, idx) => {
        html += `<div style="font-size:13px;color:#ccc;margin-pi:2px;">Set ${idx+1}: <b>${s.w||'-'}kg</b> × <b>${s.r||'-'}</b> reps${s.rpe?' · RPE '+s.rpe:''}</div>`;
      });
      html += `</div>`;
    });
  });
  document.getElementById('overviewBody').innerHTML = html;

  const laBtn = document.getElementById('logAgainBtn');
  if (scheduled) { laBtn.style.display = 'block'; laBtn.onclick = () => { document.getElementById('overviewModal').style.display='none'; startSession(scheduled, dateStr); }; }
  else laBtn.style.display = 'none';

  const delBtn = document.getElementById('deleteLogBtn');
  delBtn.style.display = 'block'; delBtn.onclick = () => {
    delete logs[dateStr]; saveLogs(logs); document.getElementById('overviewModal').style.display='none';
    renderCalendar(); renderToday();
  };
  document.getElementById('overviewModal').style.display = 'flex';
}

document.getElementById('closeOverview').onclick = () => { document.getElementById('overviewModal').style.display='none'; };
document.getElementById('prevMonth').onclick = () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); };
document.getElementById('nextMonth').onclick = () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); };

// ---------- SWIPE BETWEEN PAGES ----------
const PAGE_ORDER = ['today', 'calendar', 'stats'];

function currentPageIndex() {
  const activeBtn = document.querySelector('.nav-btn.active');
  return activeBtn ? PAGE_ORDER.indexOf(activeBtn.dataset.page) : 0;
}

function goToPageByIndex(idx) {
  idx = Math.max(0, Math.min(PAGE_ORDER.length - 1, idx));
  const btn = document.querySelector('.nav-btn[data-page="' + PAGE_ORDER[idx] + '"]');
  if (btn) btn.click();
}

(function setupSwipeNav() {
  let startX = 0, startY = 0, tracking = false, horizontal = false;
  const threshold = 70;

  function activePageEl() { return document.querySelector('.page.active'); }

  function onStart(e) {
    if (e.target.closest('input[type="range"], .cal-header, .modal-overlay')) return;
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX; startY = t.clientY;
    tracking = true; horizontal = false;
  }
  function onMove(e) {
    if (!tracking) return;
    const t = e.touches ? e.touches[0] : e;
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    if (!horizontal && Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy) * 1.3) horizontal = true;
    if (horizontal) {
      const page = activePageEl();
      if (page) page.style.transform = 'translateX(' + dx + 'px)';
      if (e.cancelable) e.preventDefault();
    }
  }
  function onEnd(e) {
    if (!tracking) return;
    tracking = false;
    if (!horizontal) return;
    const t = e.changedTouches ? e.changedTouches[0] : e;
    const dx = t.clientX - startX;
    const page = activePageEl();
    if (page) {
      page.style.transition = 'transform 0.2s ease';
      page.style.transform = 'translateX(0px)';
      setTimeout(() => { if (page) { page.style.transition = ''; } }, 220);
    }
    if (Math.abs(dx) > threshold) {
      const idx = currentPageIndex();
      if (dx < 0) goToPageByIndex(idx + 1);
      else goToPageByIndex(idx - 1);
    }
    horizontal = false;
  }

  document.addEventListener('touchstart', onStart, { passive: true });
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onEnd, { passive: true });
})();

// ---------- DRAG-DOWN-TO-DISMISS MODALS ----------
function makeSheetDraggable(overlayId, closeFn) {
  const overlay = document.getElementById(overlayId);
  const sheet = overlay.querySelector('.modal-sheet');
  const handle = overlay.querySelector('.modal-handle');
  const header = overlay.querySelector('.modal-header');
  if (!sheet) return;

  let startY = 0, dragging = false;

  function onStart(e) {
    const t = e.touches ? e.touches[0] : e;
    startY = t.clientY;
    dragging = true;
    sheet.style.transition = '';
  }
  function onMove(e) {
    if (!dragging) return;
    const t = e.touches ? e.touches[0] : e;
    const dy = Math.max(0, t.clientY - startY);
    sheet.style.transform = 'translateY(' + dy + 'px)';
  }
  function onEnd(e) {
    if (!dragging) return;
    dragging = false;
    const t = e.changedTouches ? e.changedTouches[0] : e;
    const dy = Math.max(0, t.clientY - startY);
    sheet.style.transition = 'transform 0.2s ease';
    if (dy > 110) {
      sheet.style.transform = 'translateY(100%)';
      setTimeout(() => {
        closeFn();
        sheet.style.transition = '';
        sheet.style.transform = '';
      }, 180);
    } else {
      sheet.style.transform = 'translateY(0)';
      setTimeout(() => { sheet.style.transition = ''; }, 200);
    }
  }

  [handle, header].forEach(el => {
    if (!el) return;
    el.addEventListener('touchstart', onStart, { passive: true });
    el.addEventListener('touchmove', onMove, { passive: true });
    el.addEventListener('touchend', onEnd, { passive: true });
  });
}

makeSheetDraggable('sessionModal', closeSessionModal);
makeSheetDraggable('overviewModal', () => { document.getElementById('overviewModal').style.display = 'none'; });

// ---------- INITIALIZE ----------
renderToday();

// hide the loading screen once the UI has painted (keep it up at least 400ms so it doesn't just flash)
window.addEventListener('load', () => {
  setTimeout(() => {
    const ls = document.getElementById('loadingScreen');
    if (!ls) return;
    ls.style.opacity = '0';
    ls.style.pointerEvents = 'none';
    setTimeout(() => ls.remove(), 400);
  }, 400);
});
</script>
